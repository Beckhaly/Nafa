# ═════════════════════════════════════════════════════════════════════════════
# NAFA — Docker Compose Configuration (Optionnel - pour développement/tests)
# Usage: docker-compose -f deploy/docker-compose.yml up -d
# ═════════════════════════════════════════════════════════════════════════════

version: '3.8'

services:
  # ─────────────────────────────────────────────────────────────────────────
  # MySQL Database
  # ─────────────────────────────────────────────────────────────────────────

  mysql:
    image: mysql:8.0
    container_name: nafa-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nafa
      MYSQL_USER: nafa_user
      MYSQL_PASSWORD: nafa_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nafa-network

  # ─────────────────────────────────────────────────────────────────────────
  # Redis Cache (Optionnel)
  # ─────────────────────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: nafa-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nafa-network

  # ─────────────────────────────────────────────────────────────────────────
  # PHP Application (Laravel)
  # ─────────────────────────────────────────────────────────────────────────

  php:
    build:
      context: .
      dockerfile: Dockerfile.php
    container_name: nafa-php
    environment:
      - APP_ENV=production
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=nafa
      - DB_USERNAME=nafa_user
      - DB_PASSWORD=nafa_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "8000:8000"
    volumes:
      - ./backend-laravel:/var/www/backend-laravel
      - ./logs/php:/var/log/php
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nafa-network
    command: >
      sh -c "cd /var/www/backend-laravel &&
             composer install &&
             php artisan migrate:fresh --force &&
             php artisan db:seed-schema &&
             php artisan serve --host=0.0.0.0 --port=8000"

  # ─────────────────────────────────────────────────────────────────────────
  # Nginx Reverse Proxy
  # ─────────────────────────────────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    container_name: nafa-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/dist:/var/www/html/frontend:ro
      - ./backend-laravel/public:/var/www/html/api:ro
      - ./deploy/nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - php
    networks:
      - nafa-network

  # ─────────────────────────────────────────────────────────────────────────
  # Frontend Development (Node.js)
  # ─────────────────────────────────────────────────────────────────────────

  node:
    image: node:18-alpine
    container_name: nafa-node
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/var/www/frontend
      - /var/www/frontend/node_modules
    working_dir: /var/www/frontend
    networks:
      - nafa-network
    command: sh -c "npm install && npm run dev"

networks:
  nafa-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
