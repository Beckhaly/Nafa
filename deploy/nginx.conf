# ═════════════════════════════════════════════════════════════════════════════
# NAFA — Nginx Server Configuration
# Variables à remplacer:
#   - DOMAIN: votre domaine (ex: nafa.exemple.com)
#   - APP_PATH: chemin d'installation (ex: /var/www/nafa)
# ═════════════════════════════════════════════════════════════════════════════

upstream backend {
    server 127.0.0.1:8000;
    keepalive 10;
}

upstream php {
    server unix:/run/php/php8.2-fpm.sock;
    keepalive 10;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name DOMAIN;

    return 301 https://$server_name$request_uri;
}

# HTTPS Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name DOMAIN;

    # SSL Certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN/privkey.pem;

    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

    # Logging
    access_log /var/log/nginx/DOMAIN-access.log combined buffer=32k flush=5m;
    error_log /var/log/nginx/DOMAIN-error.log warn;

    # Root directory
    root APP_PATH;

    # Performance
    client_max_body_size 100M;
    client_body_timeout 60s;
    client_header_timeout 60s;
    keepalive_timeout 65s;
    send_timeout 60s;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        application/font-woff
        application/font-woff2
        image/svg+xml;
    gzip_disable "msie6";

    # ─────────────────────────────────────────────────────────────────────────
    # Frontend (React)
    # ─────────────────────────────────────────────────────────────────────────

    location / {
        # Try to serve as static file, then as directory, then fallback to index.html (SPA)
        try_files $uri $uri/ /index.html;

        # Set expiration for index.html (no cache)
        location = /index.html {
            add_header Cache-Control "public, max-age=0, must-revalidate" always;
            add_header Content-Type "text/html; charset=utf-8";
        }

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            access_log off;
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Backend API (Laravel)
    # ─────────────────────────────────────────────────────────────────────────

    location /api {
        alias APP_PATH/backend-laravel/public;

        try_files $uri /api/index.php?$query_string;

        location ~ \.php$ {
            fastcgi_pass php;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $request_filename;
            fastcgi_param PHP_VALUE "upload_max_filesize=100M \n post_max_size=100M";

            include fastcgi_params;
            fastcgi_buffering off;
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Storage (Public files uploaded)
    # ─────────────────────────────────────────────────────────────────────────

    location /storage {
        alias APP_PATH/backend-laravel/storage/app/public;

        # Cache static files
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            add_header Cache-Control "public, max-age=31536000" always;
            access_log off;
        }

        # Deny access to sensitive files
        location ~ /\.ht {
            deny all;
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Backend public directory (for direct API access if needed)
    # ─────────────────────────────────────────────────────────────────────────

    location /public {
        alias APP_PATH/backend-laravel/public;

        # Only for direct static access
        location ~ \.php$ {
            fastcgi_pass php;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $request_filename;
            include fastcgi_params;
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Deny access to sensitive files
    # ─────────────────────────────────────────────────────────────────────────

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny direct access to Laravel routes/components
    location ~ ^/(artisan|app|bootstrap|config|database|resources|routes|storage|tests) {
        deny all;
        return 404;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Health check endpoint
    # ─────────────────────────────────────────────────────────────────────────

    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Status/monitoring endpoint (restrict in production)
    # ─────────────────────────────────────────────────────────────────────────

    location /nginx_status {
        access_log off;
        allow 127.0.0.1;
        allow ::1;
        deny all;
        stub_status on;
    }
}
